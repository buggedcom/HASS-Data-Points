name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Extract version from tag ───────────────────────────────
      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG"    >> "$GITHUB_OUTPUT"

      # ── Stamp version into manifest.json ───────────────────────
      - name: Update manifest.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/hass_datapoints/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '$VERSION'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "

      # ── Build frontend JS ─────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend JS
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/build.sh

      - name: Verify JS syntax
        run: node -c custom_components/hass_datapoints/hass-datapoints-cards.js

      # ── Validate Python ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          python -m py_compile custom_components/hass_datapoints/__init__.py
          python -m py_compile custom_components/hass_datapoints/config_flow.py
          python -m py_compile custom_components/hass_datapoints/const.py
          python -m py_compile custom_components/hass_datapoints/logbook.py
          python -m py_compile custom_components/hass_datapoints/store.py
          python -m py_compile custom_components/hass_datapoints/websocket_api.py

      # ── Package the integration ────────────────────────────────
      - name: Create release zip
        run: |
          cd custom_components
          zip -r ../hass-datapoints.zip hass_datapoints/ \
            -x "hass_datapoints/src/*" \
            -x "hass_datapoints/__pycache__/*"

      # ── Create GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hass Data Points ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: hass-datapoints.zip
