[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_classes = ["Test", "Describe"]

[tool.coverage.run]
source = ["custom_components/hass_datapoints"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "SIM", # flake8-simplify
]
ignore = [
  "E501",  # line too long — handled by ruff format
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.hass_datapoints"]
